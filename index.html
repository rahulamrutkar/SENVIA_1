<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SENVIA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:#0a0a0a;color:#f0ede8;font-family:'DM Sans',sans-serif;}
:root{
  --font-serif:'Cormorant Garamond',serif;
  --bg:#0a0a0a;--s1:#141414;--s2:#1e1e1e;
  --b1:#2a2a2a;--b2:#333;
  --tx:#f0ede8;--mu:#666;--mu2:#999;
  --gd:#d4a853;--gd2:#b8902f;--gdim:rgba(212,168,83,.12);
  --red:#ef4444;--grn:#22c55e;
}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes sc{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.u{animation:up .4s cubic-bezier(.16,1,.3,1) both}
.i{animation:fi .25s ease both}
.s{animation:sc .3s cubic-bezier(.16,1,.3,1) both}
.spin{animation:spin .8s linear infinite}
input,select,textarea,button{font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px;}

/* VIEWS */
.view{display:none;}
.view.on{display:block;}
#va.on{display:flex;}

/* HEADER */
.hd{background:rgba(10,10,10,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--b1);padding:0 36px;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:50;}
.lw{display:flex;align-items:center;gap:11px;}
.li{height:36px;width:36px;object-fit:contain;border-radius:3px;}
.sn{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;letter-spacing:4px;}
.st{font-size:9px;color:var(--mu);letter-spacing:3px;margin-top:1px;}

/* BUTTONS */
.btn{border:none;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;}
.bg{background:transparent;border:1px solid var(--b2);color:var(--mu2);padding:7px 18px;font-size:11px;letter-spacing:1.5px;}
.bg:hover{border-color:var(--gd);color:var(--gd);}
.bp{background:var(--gd);color:#0a0a0a;padding:11px 22px;font-size:11px;letter-spacing:2px;font-weight:600;}
.bp:hover{background:var(--gd2);}
.bp:disabled{opacity:.55;cursor:not-allowed;}
.bd{background:var(--s2);color:var(--tx);border:1px solid var(--b2);padding:9px 16px;font-size:11px;letter-spacing:1px;}
.bd:hover{border-color:var(--gd);}
.br{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25);padding:6px 13px;font-size:11px;}
.br:hover{background:var(--red);color:#fff;}

/* CAT BAR */
.cb{background:var(--s1);border-bottom:1px solid var(--b1);padding:0 36px;display:flex;overflow-x:auto;scrollbar-width:none;}
.cb::-webkit-scrollbar{display:none;}
.cb-b{background:none;border:none;padding:13px 17px;cursor:pointer;font-size:11px;color:var(--mu);letter-spacing:1px;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;}
.cb-b:hover{color:var(--tx);}
.cb-b.on{color:var(--gd);border-bottom-color:var(--gd);font-weight:600;}

/* GRID */
.gw{padding:32px 36px;max-width:1400px;margin:0 auto;}
.g{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:1px;background:var(--b1);}
.cd{background:var(--s1);cursor:pointer;transition:background .18s;overflow:hidden;display:flex;flex-direction:column;}
.cd:hover{background:var(--s2);}
.ci{width:100%;height:216px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:50px;overflow:hidden;flex-shrink:0;position:relative;}
.ci img{width:100%;height:100%;object-fit:cover;}
.cbody{padding:15px 17px;flex:1;display:flex;flex-direction:column;gap:4px;}
.cname{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;line-height:1.2;color:var(--tx);margin-top:2px;}
.cprice{font-size:13px;font-weight:600;color:var(--gd);margin-top:3px;}
.cdesc{font-size:11px;color:var(--mu);line-height:1.55;margin-top:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.badge{display:inline-block;padding:3px 9px;background:var(--gdim);color:var(--gd);font-size:10px;letter-spacing:.5px;font-weight:600;}

/* EMPTY/CENTER */
.ec{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:90px 20px;text-align:center;color:var(--mu);}
.ec .ico{font-size:42px;opacity:.22;margin-bottom:15px;}
.ec p{font-size:13px;line-height:1.8;}
.sp{width:24px;height:24px;border:2px solid var(--b2);border-top-color:var(--gd);border-radius:50%;}

/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(8px);}

/* PRODUCT MODAL */
.pm{background:var(--s1);max-width:850px;width:100%;max-height:90vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;position:relative;border:1px solid var(--b2);}
.pmi{height:450px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:78px;overflow:hidden;}
.pmi img{width:100%;height:100%;object-fit:cover;}
.pmb{padding:38px;display:flex;flex-direction:column;gap:13px;}
.xb{position:absolute;top:13px;right:13px;background:rgba(0,0,0,.7);color:var(--tx);border:1px solid var(--b2);width:33px;height:33px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:1;backdrop-filter:blur(4px);}
.xb:hover{background:var(--s2);}

/* INQ MODAL */
.im{background:var(--s1);max-width:430px;width:100%;padding:34px;position:relative;max-height:90vh;overflow-y:auto;border:1px solid var(--b2);}

/* FORM */
.fg{margin-bottom:13px;}
.fl{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mu2);margin-bottom:6px;font-weight:500;}
.fi{width:100%;padding:10px 13px;border:1px solid var(--b2);background:var(--s2);font-size:13px;outline:none;color:var(--tx);transition:border .18s;}
.fi:focus{border-color:var(--gd);}
textarea.fi{resize:vertical;min-height:72px;}
select.fi{cursor:pointer;}

/* ALERTS */
.as{background:rgba(34,197,94,.1);color:var(--grn);border:1px solid rgba(34,197,94,.25);padding:10px 13px;font-size:12px;margin-bottom:13px;}
.ae{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25);padding:10px 13px;font-size:12px;margin-bottom:11px;}
.ai{background:var(--gdim);border-left:3px solid var(--gd);padding:12px 15px;font-size:12px;color:var(--mu2);line-height:1.7;}

/* ADMIN */
.aside{width:225px;background:var(--s1);border-right:1px solid var(--b1);flex-shrink:0;display:flex;flex-direction:column;height:100vh;position:sticky;top:0;}
.sh{padding:18px 16px 14px;border-bottom:1px solid var(--b1);}
.snav{display:flex;flex-direction:column;flex:1;padding-top:4px;overflow-y:auto;}
.snb{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:var(--mu);padding:11px 16px;cursor:pointer;font-size:11px;text-align:left;transition:all .18s;border-left:2px solid transparent;letter-spacing:.3px;}
.snb:hover{color:var(--tx);background:var(--s2);}
.snb.on{color:var(--gd);background:var(--gdim);border-left-color:var(--gd);}
.sft{padding:11px 14px;border-top:1px solid var(--b1);display:flex;flex-direction:column;gap:7px;}
.am{flex:1;padding:32px;overflow-y:auto;background:var(--bg);}
.tab{display:none;}.tab.on{display:block;}
.ah{margin-bottom:24px;}
.at{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:400;color:var(--tx);}
.as2{font-size:12px;color:var(--mu);margin-top:3px;}
.tw{overflow-x:auto;}
table.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:var(--s1);color:var(--mu2);padding:9px 13px;text-align:left;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:500;border-bottom:1px solid var(--b2);}
.tbl td{padding:12px 13px;border-bottom:1px solid var(--b1);color:var(--tx);vertical-align:middle;}
.tbl tr:hover td{background:var(--s2);}
.thumb{width:42px;height:42px;background:var(--s2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.fc{background:var(--s1);border:1px solid var(--b1);padding:26px;max-width:555px;}
.uz{border:2px dashed var(--b2);padding:22px;text-align:center;cursor:pointer;transition:all .18s;background:var(--s2);}
.uz:hover{border-color:var(--gd);}
.chip{background:var(--s2);padding:4px 11px;font-size:11px;display:inline-flex;align-items:center;gap:6px;color:var(--tx);border:1px solid var(--b1);margin:3px;}
.cx{color:var(--red);cursor:pointer;font-weight:700;}
.dt{border-top:1px solid var(--b1);padding-top:22px;margin-top:6px;}
.sb{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--tx);margin-bottom:13px;}
.scr{background:#0d1117;color:#8ec07c;padding:14px;font-size:10.5px;font-family:monospace;line-height:1.75;overflow-x:auto;margin-top:11px;white-space:pre;border:1px solid var(--b2);}
.lb{width:74px;height:74px;background:var(--s2);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.lb img{width:100%;height:100%;object-fit:contain;padding:5px;}
.pbar{background:var(--bg);border:1px solid var(--b1);padding:9px 14px;display:flex;align-items:center;gap:9px;margin-top:12px;}

/* STORAGE STATUS BAR */
.storage-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:11px;border-bottom:1px solid var(--b1);background:var(--s1);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:var(--grn);}
.dot-warn{background:#f59e0b;}

/* CUSTOMER VIEW BANNER */
.cv-banner{background:var(--gdim);border-bottom:1px solid var(--gd);padding:8px 36px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--gd);}

/* LOGIN */
.lv{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.lb2{background:var(--s1);padding:42px 38px;max-width:370px;width:100%;margin:20px;border:1px solid var(--b1);}

/* DONE */
.done{text-align:center;padding:32px 0;}
.done .di{font-size:42px;margin-bottom:12px;}
.done h3{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--tx);margin-bottom:5px;}
.done p{font-size:12px;color:var(--mu);}

@media(max-width:660px){
  .hd,.cb,.gw{padding-left:14px;padding-right:14px;}
  .pm{grid-template-columns:1fr;}.pmi{height:210px;}
  .aside{width:185px;}.am{padding:18px;}
}
</style>
</head>
<body>

<!-- ══ STORE VIEW ══ -->
<div id="vs" class="view on">
  <!-- Admin preview banner (shown when admin views store) -->
  <div id="cv-banner" style="display:none;" class="cv-banner">
    <span>👁 You are viewing as Customer — changes are live</span>
    <button onclick="show('va');renderAdmin();" style="background:var(--gd);color:#0a0a0a;border:none;padding:5px 14px;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:1px;">← Back to Admin</button>
  </div>
  <header class="hd">
    <div id="sbrand" class="lw"></div>
    <button class="btn bg" onclick="showLogin()">ADMIN</button>
  </header>
  <div id="catbar" class="cb"></div>
  <div class="gw"><div id="pgrid"></div></div>
</div>

<!-- ══ LOGIN VIEW ══ -->
<div id="vl" class="view">
  <div class="lv">
    <div class="lb2 s">
      <div style="font-family:'Cormorant Garamond',serif;font-size:26px;letter-spacing:4px;margin-bottom:5px;">SENVIA</div>
      <div style="font-size:10px;color:var(--mu);letter-spacing:2px;margin-bottom:28px;">ADMIN ACCESS</div>
      <label class="fl">Password</label>
      <input class="fi" id="lpw" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
      <div id="lerr" class="ae" style="display:none;margin-top:8px;margin-bottom:0;"></div>
      <div style="height:18px;"></div>
      <button class="btn bp" style="width:100%;" onclick="doLogin()">SIGN IN →</button>
      <div style="text-align:center;font-size:11px;color:var(--mu);margin:12px 0 4px;">Default: admin123</div>
      <button onclick="goStore()" style="display:block;width:100%;background:none;border:none;color:var(--mu);font-size:11px;cursor:pointer;padding:8px;">← Back to Store</button>
    </div>
  </div>
</div>

<!-- ══ ADMIN VIEW ══ -->
<div id="va" class="view">
  <div class="aside">
    <div class="sh" id="abrand"></div>
    <div class="snav">
      <button class="snb on" data-t="tp" onclick="stab(this,'tp')"><span style="width:17px;text-align:center;">📦</span>Products</button>
      <button class="snb" data-t="ta" onclick="stab(this,'ta')"><span style="width:17px;text-align:center;">➕</span>Add Product</button>
      <button class="snb" data-t="ti" onclick="stab(this,'ti')"><span style="width:17px;text-align:center;">📩</span>Inquiries<span id="ibadge" style="display:none;margin-left:auto;background:var(--gd);color:#0a0a0a;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700;"></span></button>
      <button class="snb" data-t="ts" onclick="stab(this,'ts')"><span style="width:17px;text-align:center;">⚙️</span>Settings</button>
    </div>
    <div class="sft">
      <!-- Customer view button -->
      <button onclick="viewAsCustomer()" style="width:100%;background:var(--gdim);border:1px solid var(--gd);color:var(--gd);padding:9px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:6px;">👁 Customer View</button>
      <button onclick="goStore()" style="width:100%;background:none;border:1px solid var(--b1);color:var(--mu);padding:9px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;" onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)';" onmouseout="this.style.borderColor='var(--b1)';this.style.color='var(--mu)';">Sign Out</button>
    </div>
  </div>
  <div class="am">
    <div id="tp" class="tab on"></div>
    <div id="ta" class="tab"></div>
    <div id="ti" class="tab"></div>
    <div id="ts" class="tab"></div>
  </div>
</div>

<!-- ══ PRODUCT MODAL ══ -->
<div id="pov" class="ov" style="display:none;" onclick="if(event.target===this)closePM()">
  <div id="pmod" class="pm s"></div>
</div>

<!-- ══ INQUIRY MODAL ══ -->
<div id="iov" class="ov" style="display:none;" onclick="if(event.target===this)closeIM()">
  <div id="imod" class="im s"></div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   BAKED_SHEETS_URL — set once, works on EVERY device.
   Admin: after connecting Google Sheets, click
   "Download Updated App" in Settings, then re-deploy to GitHub.
   That new file has your URL here so all visitors auto-sync.
══════════════════════════════════════════════════════════ */
var BAKED_SHEETS_URL = '';  // ← auto-filled when you download the updated app

/* ══════════════════════════════
   STORAGE — localStorage as primary persistent store
══════════════════════════════ */
const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));return true;}catch(e){console.error('LS write fail',e);return false;}}
};

/* ══════════════════════════════
   INITIAL STATE — loaded from localStorage
══════════════════════════════ */
const CI={'Electronics':'📱','Clothing':'👗','Home & Garden':'🏡','Sports':'⚽','Books':'📚','Food':'🍕','Beauty':'💄','Toys':'🧸','Furniture':'🪑','Jewellery':'💎'};
const ci=c=>CI[c]||'📦';
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// Merge localStorage config with baked defaults
// BAKED_SHEETS_URL ensures every device knows where to fetch data from
var _savedCfg = LS.get('sv_cfg', {});
var _defaultCfg = {
  storeName: 'SENVIA',
  tagline:   'Discover Premium Products',
  logoUrl:   '',
  apiUrl:    BAKED_SHEETS_URL  // ← always available, even on fresh devices
};
// localStorage wins for most fields, but if apiUrl is empty use BAKED_SHEETS_URL
var _mergedCfg = Object.assign({}, _defaultCfg, _savedCfg);
if(!_mergedCfg.apiUrl && BAKED_SHEETS_URL) _mergedCfg.apiUrl = BAKED_SHEETS_URL;

let D={
  prods: LS.get('sv_prods',[]),
  cats:  LS.get('sv_cats',['Electronics','Clothing','Home & Garden','Sports','Books']),
  inqs:  LS.get('sv_inqs',[]),
  cfg:   _mergedCfg,
  cat:'All',
  sel:null,
  loading:false,
  adminMode:false
};

// Persist everything to localStorage immediately
function persist(){
  LS.set('sv_prods', D.prods);
  LS.set('sv_cats',  D.cats);
  LS.set('sv_inqs',  D.inqs);
  LS.set('sv_cfg',   D.cfg);
}

/* ══════════════════════════════════════════════
   GOOGLE SHEETS — FULL READ+WRITE SYNC
   ──────────────────────────────────────────────
   READ  → JSONP via <script> tag — bypasses CORS completely.
           Works from any host (Netlify, file://, anywhere).
           Apps Script returns: callback({products,cats,cfg})
   WRITE → no-cors POST — fire-and-forget background sync.
   
   This means ALL admin changes (products, categories, logo,
   store name) are stored in Sheets and loaded by every customer
   on every page visit. No more stale localStorage data.
══════════════════════════════════════════════ */

/* WRITE — fire-and-forget POST (always works, no CORS) */
function sheetsPost(action, body){
  var url = D.cfg.apiUrl;
  if(!url) return;
  fetch(url,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({action: action, data: body})
  }).catch(function(){});
}

/* READ — JSONP via <script> tag.
   The Apps Script detects ?callback=X and wraps its JSON response
   in X({...}) — the browser executes it as a script, calling our handler. */
function sheetsLoad(onSuccess, onFail){
  var url = D.cfg.apiUrl;
  if(!url){ if(onFail) onFail('no-url'); return; }

  var cbName = '__sv_cb_' + Date.now();
  var script  = document.createElement('script');
  var timer   = setTimeout(function(){
    cleanup(); if(onFail) onFail('timeout');
  }, 8000);

  function cleanup(){
    clearTimeout(timer);
    if(script.parentNode) script.parentNode.removeChild(script);
    delete window[cbName];
  }

  window[cbName] = function(data){
    cleanup();
    if(data && typeof data === 'object'){ onSuccess(data); }
    else { if(onFail) onFail('bad-data'); }
  };

  script.src = url + '?action=getAllData&callback=' + cbName;
  script.onerror = function(){ cleanup(); if(onFail) onFail('script-error'); };
  document.head.appendChild(script);
}

/* Load all shared data from Sheets and refresh the UI */
function syncFromSheets(onDone){
  if(!D.cfg.apiUrl){ if(onDone) onDone(false); return; }
  D.loading = true;
  renderGrid(); renderTP();

  sheetsLoad(function(data){
    D.loading = false;
    var changed = false;

    if(Array.isArray(data.products) && data.products.length > 0){
      D.prods = data.products; changed = true;
    }
    if(Array.isArray(data.cats) && data.cats.length > 0){
      D.cats = data.cats; changed = true;
    }
    if(data.cfg && typeof data.cfg === 'object'){
      // Preserve the apiUrl and password — don't overwrite with Sheets version
      var incoming = data.cfg;
      incoming.apiUrl = D.cfg.apiUrl; // keep local apiUrl
      D.cfg = incoming; changed = true;
    }

    if(changed){
      // Update slogo for settings panel
      slogo = D.cfg.logoUrl || '';
      persist(); // cache locally so offline still works
      renderBrand(); renderCatBar(); renderGrid(); renderTP();
      document.title = D.cfg.storeName || 'SENVIA';
    }
    if(onDone) onDone(true);
  }, function(err){
    D.loading = false;
    renderGrid(); renderTP();
    if(onDone) onDone(false);
  });
}

/* Send a visible test row to Sheets so you can confirm it is working */
function sendTestToSheets(){
  var out = document.getElementById('test-sheets-out');
  if(!D.cfg.apiUrl){
    out.innerHTML='<div class="ae">No Sheets URL saved. Go to Settings first.</div>';
    return;
  }
  if(location.protocol==='file:'){
    out.innerHTML='<div class="ai"><strong style="color:var(--mu2);">You are opening this file locally.</strong><br><br>Browsers block all network requests from local files. You must deploy to Netlify first.<br><br><strong style="color:var(--gd);">Steps:</strong><ol style="margin:8px 0 0 16px;line-height:2.4;"><li>Go to <a href="https://drop.netlify.com" target="_blank" style="color:var(--gd);">drop.netlify.com</a></li><li>Drag and drop <strong>senvia.html</strong> onto the page</li><li>Copy the live URL (e.g. abc123.netlify.app)</li><li>Open that URL — Google Sheets will work from there</li></ol></div>';
    return;
  }
  out.innerHTML='<div class="ai">Sending test row...</div>';
  fetch(D.cfg.apiUrl,{
    method:'POST',
    mode:'no-cors',

/* Validate & save the Sheets URL — no network call needed.
   Browser CORS blocks all direct requests to Apps Script, so we
function testSheetsConnection(){
  var url = (document.getElementById('sapi') ? document.getElementById('sapi').value : '').trim();

  if(!url){
    showSheetsStatus('error','❌ No URL entered — paste your Web App URL above.');
    return;
  }

  // Accept any script.google.com URL — don't reject based on exact format
  // Some deployments use slightly different URL patterns
  if(url.indexOf('script.google.com') === -1 && url.indexOf('googleapis.com') === -1){
    showSheetsStatus('error',
      '❌ This doesn\'t look like a Google Apps Script URL.<br>' +
      'It should come from <strong>script.google.com</strong>.<br><br>' +
      'Paste the URL exactly as Google gave it to you after clicking Deploy.');
    return;
  }

  // Save the URL immediately — don't block on validation
  D.cfg.apiUrl = url;
  persist();

  showSheetsStatus('testing', '⏳ URL saved. Testing live connection…');

  // Test JSONP read — what every customer's browser does on page load
  sheetsLoad(function(data){
    showSheetsStatus('ok',
      '✅ <strong>Connected and working!</strong><br><br>' +
      'Live sync is active. Every admin change (products, categories, logo, store name) ' +
      'will appear for all customers immediately.<br><br>' +
      'Now click <strong>⬇️ Download Updated App</strong> below, ' +
      'then upload it to GitHub so all devices get the URL.<br><br>' +
      '<a href="https://sheets.google.com" target="_blank" ' +
      'style="color:var(--gd);font-weight:600;">Open Google Sheets →</a>');
  }, function(err){
    // JSONP failed — but URL is saved. Give clear next steps.
    showSheetsStatus('warn',
      '⚠️ <strong>URL saved</strong> — but the live read test failed.<br><br>' +
      'You can still download the updated app and deploy it. ' +
      'Products and inquiries will still be sent to Sheets in the background.<br><br>' +
      '<strong>To fix the read (so customers see live data):</strong><br>' +
      '1. Go to Apps Script → <strong>Deploy → New deployment</strong><br>' +
      '2. Make sure <em>Who has access</em> = <strong>Anyone</strong><br>' +
      '3. Click Deploy → click <strong>Review permissions → Allow</strong><br>' +
      '4. Copy the new URL → paste above → Test again<br><br>' +
      '<small style="color:var(--mu);">Error detail: ' + err + '</small>');
  });
}

function showSheetsStatus(type, msg){
  const el=document.getElementById('sheets-status');
  if(!el) return;
  const colors={
    ok:      {bg:'rgba(34,197,94,.1)',  border:'rgba(34,197,94,.3)',  color:'#22c55e'},
    warn:    {bg:'rgba(245,158,11,.1)', border:'rgba(245,158,11,.3)', color:'#f59e0b'},
    error:   {bg:'rgba(239,68,68,.1)',  border:'rgba(239,68,68,.3)',  color:'#ef4444'},

/* ══════════════════════════════
   IMAGE COMPRESSION
══════════════════════════════ */
function compress(file, maxPx, quality){
  maxPx = maxPx || 800;
  quality = quality || 0.75;
  return new Promise(function(resolve){
    // Use FileReader — works in all browsers including file:// and Netlify
    var reader = new FileReader();
    reader.onerror = function(){ resolve(''); };
    reader.onload = function(e){
      var dataUrl = e.target.result;
      var img = new Image();
      img.onerror = function(){ resolve(dataUrl); }; // fallback: use original
      img.onload = function(){
        try{
          var ratio = Math.min(maxPx / img.width, maxPx / img.height, 1);
          var canvas = document.createElement('canvas');
          canvas.width  = Math.round(img.width  * ratio);
          canvas.height = Math.round(img.height * ratio);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          var compressed = canvas.toDataURL('image/jpeg', quality);
          resolve(compressed);
        }catch(err){
          resolve(dataUrl); // fallback: use original if canvas fails
        }
      };
      img.src = dataUrl;
    };
    reader.readAsDataURL(file);
  });
}

async function submitInq(){

  const phone=document.getElementById('ip')?.value.trim();
  const msg=document.getElementById('im2')?.value.trim();

    errEl.innerHTML='<div class="ae">Name, email and phone are required.</div>'; return;

  if(!/\S+@\S+\.\S+/.test(email)){
    errEl.innerHTML='<div class="ae">Enter a valid email address.</div>'; return;
  }

  const btn=document.getElementById('isub');
  btn.disabled=true; btn.textContent='SUBMITTING…';

  const entry={
    id: Date.now().toString(),
    name, email, phone,
    message: msg||'',
    productName: D.sel?.name||'General',
    productId:   D.sel?.id||'',
    timestamp:   new Date().toISOString()
  };

  // 1. Save locally FIRST (always works)
  D.inqs.push(entry);
  persist();

  // 2. Fire-and-forget to Google Sheets (no await, no error check)
  sheetsPost('addInquiry', entry);

  // 3. Show result
  const sheetsNote = D.cfg.apiUrl
    ? '<p style="font-size:11px;color:var(--grn);margin-top:8px;">✅ Also sent to Google Sheets</p>'
    : '';

  document.getElementById('imod').innerHTML=`
    <div class="done">
      <div class="di">✅</div>
      <h3>Inquiry Submitted</h3>
      <p>We'll reach out to you soon.</p>
      ${sheetsNote}
    </div>`;

  setTimeout(()=>{ closeIM(); renderIBadge(); renderTI(); }, 3000);
}

function loadInquiriesFromSheets(cb){
  var url = D.cfg.apiUrl;
  if(!url){ cb(null); return; }
  var cbName = '__sv_inq_' + Date.now();
  var script  = document.createElement('script');
  var timer   = setTimeout(function(){ cleanup(); cb(null); }, 8000);
  function cleanup(){
    clearTimeout(timer);
    if(script.parentNode) script.parentNode.removeChild(script);
    delete window[cbName];
  }
  window[cbName] = function(data){
    cleanup();
    cb(Array.isArray(data) ? data : null);
  };
  script.src = url + '?action=getInquiries&callback=' + cbName;
  script.onerror = function(){ cleanup(); cb(null); };
  document.head.appendChild(script);
}

// SENVIA — Google Apps Script  (REPLACE ENTIRE FILE WITH THIS)

// ── READ: JSONP endpoint — called by every browser on page load ──
// Returns ALL shared data: products, categories, settings
function doGet(e) {
  var cb = e.parameter.callback || 'callback';
  var action = e.parameter.action || '';

  if (action === 'getAllData') {
    var data = {
      products: getProductRows(),
      cats:     getCategoryRows(),
      cfg:      getSettingsRow()
    };
    var json = JSON.stringify(data);
    return ContentService
      .createTextOutput(cb + '(' + json + ')')
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }

  if (action === 'getInquiries') {
    var rows = getInquiryRows();
    var json = JSON.stringify(rows);
    return ContentService
      .createTextOutput(cb + '(' + json + ')')
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }

  return ContentService
    .createTextOutput('SENVIA API OK')
    .setMimeType(ContentService.MimeType.TEXT);
}

// ── WRITE: POST endpoint — called silently in background ──
function doPost(e) {
  try {
    var raw = e.postData.contents;
    var d   = JSON.parse(raw);
    var act = d.action || '';

    if (act === 'saveProduct')      return saveProduct(d.data);
    if (act === 'saveAllProducts')  return saveAllProducts(d.data);
    if (act === 'deleteProduct')    return deleteProduct(d.data);
    if (act === 'saveCategories')   return saveCategories(d.data);
    if (act === 'saveSettings')     return saveSettings(d.data);
    if (act === 'addInquiry')       return addInquiry(d.data);
    if (act === 'ping')             return ok('pong');

    return ok('unknown: ' + act);
  } catch(err) {
    return ok('error: ' + err.toString());
  }
}

function ok(msg) {
  return ContentService
    .createTextOutput(JSON.stringify({status:'ok',msg:msg}))
    .setMimeType(ContentService.MimeType.JSON);
}

// ── Sheet helpers ──────────────────────────────

function getSheet(name, headers) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sh = ss.getSheetByName(name);
  if (!sh) {
    sh = ss.insertSheet(name);
    sh.getRange(1, 1, 1, headers.length)
      .setValues([headers])
      .setFontWeight('bold')
      .setBackground('#1c1c1c')
      .setFontColor('#d4a853');
    sh.setFrozenRows(1);
  }
  return sh;
}

// ── READ helpers ───────────────────────────────

function getProductRows() {
  var sh = getSheet('Products',
    ['id','name','category','price','description','image','createdAt']);
  var vals = sh.getDataRange().getValues();
  if (vals.length <= 1) return [];
  var hdrs = vals[0];
  return vals.slice(1)
    .filter(function(r){ return String(r[0]).trim() !== ''; })
    .map(function(r){
      var o = {};
      hdrs.forEach(function(h,i){ o[h] = String(r[i]||''); });
      return o;
    });
}

function getCategoryRows() {
  var sh = getSheet('Categories', ['category']);
  var vals = sh.getDataRange().getValues();
  if (vals.length <= 1) return [];
  return vals.slice(1)
    .map(function(r){ return String(r[0]||'').trim(); })
    .filter(function(c){ return c !== ''; });
}

function getSettingsRow() {
  var sh = getSheet('Settings', ['key','value']);
  var vals = sh.getDataRange().getValues();
  if (vals.length <= 1) return {};
  var cfg = {};
  vals.slice(1).forEach(function(r){
    if(r[0]) cfg[String(r[0])] = String(r[1]||'');
  });
  return cfg;
}

function getInquiryRows() {
  var sh = getSheet('Inquiries',
    ['Timestamp','Name','Email','Phone','Product','Message','ID']);
  var vals = sh.getDataRange().getValues();
  if (vals.length <= 1) return [];
  var hdrs = vals[0];
  return vals.slice(1)
    .filter(function(r){ return String(r[1]||'').trim() !== ''; })
    .map(function(r){
      var o = {};
      hdrs.forEach(function(h,i){ o[String(h)] = String(r[i]||''); });
      // Normalise field names to match what the app expects
      return {
        id:          o['ID']        || '',
        name:        o['Name']      || '',
        email:       o['Email']     || '',
        phone:       o['Phone']     || '',
        productName: o['Product']   || 'General',
        message:     o['Message']   || '',
        timestamp:   o['Timestamp'] || ''
      };
    })
    .reverse(); // newest first
}

// ── WRITE helpers ──────────────────────────────

function saveProduct(d) {
  var sh = getSheet('Products',
    ['id','name','category','price','description','image','createdAt']);
  // Check if product already exists (update) or is new (append)
  var vals = sh.getDataRange().getValues();
  for (var i = 1; i < vals.length; i++) {
    if (String(vals[i][0]) === String(d.id)) {
      sh.getRange(i+1, 1, 1, 7).setValues([[
        d.id, d.name, d.category,
        d.price||'', d.description||'',
        d.image||'', d.createdAt||''
      ]]);
      return ok('updated');
    }
  }
  sh.appendRow([d.id, d.name, d.category,
    d.price||'', d.description||'', d.image||'', d.createdAt||'']);
  return ok('added');
}

function saveAllProducts(d) {
  var sh = getSheet('Products',
    ['id','name','category','price','description','image','createdAt']);
  // Clear data rows and rewrite (keeps header)
  if (sh.getLastRow() > 1) {
    sh.getRange(2, 1, sh.getLastRow()-1, 7).clearContent();
  }
  if (d.products && d.products.length > 0) {
    var rows = d.products.map(function(p){
      return [p.id||'', p.name||'', p.category||'',
              p.price||'', p.description||'', p.image||'', p.createdAt||''];
    });
    sh.getRange(2, 1, rows.length, 7).setValues(rows);
  }
  return ok('all products saved');
}

function deleteProduct(d) {
  var sh = getSheet('Products',
    ['id','name','category','price','description','image','createdAt']);
  var vals = sh.getDataRange().getValues();
  for (var i = 1; i < vals.length; i++) {
    if (String(vals[i][0]) === String(d.id)) {
      sh.deleteRow(i + 1);
      return ok('deleted');
    }
  }
  return ok('not found');
}

function saveCategories(d) {
  var sh = getSheet('Categories', ['category']);
  if (sh.getLastRow() > 1) {
    sh.getRange(2, 1, sh.getLastRow()-1, 1).clearContent();
  }
  if (d.cats && d.cats.length > 0) {
    var rows = d.cats.map(function(c){ return [c]; });
    sh.getRange(2, 1, rows.length, 1).setValues(rows);
  }
  return ok('categories saved');
}

function saveSettings(d) {
  var sh = getSheet('Settings', ['key','value']);
  // Upsert each key
  var keys = ['storeName','tagline','logoUrl'];
  keys.forEach(function(k){
    if (d[k] === undefined) return;
    var vals = sh.getDataRange().getValues();
    for (var i = 1; i < vals.length; i++) {
      if (String(vals[i][0]) === k) {
        sh.getRange(i+1, 2).setValue(d[k]);
        return;
      }
    }
    sh.appendRow([k, d[k]]);
  });
  return ok('settings saved');
}

function addInquiry(d) {
  var sh = getSheet('Inquiries',
    ['Timestamp','Name','Email','Phone','Product','Message','ID']);
  sh.appendRow([
    new Date(), d.name||'', d.email||'', d.phone||'',
    d.productName||'General', d.message||'', d.id||''
  ]);
  return ok('inquiry saved');
}`;

/* Generate a new index.html with the Sheets URL baked in, then download it.
   Admin deploys this file to GitHub → all devices auto-sync from that moment. */
function downloadUpdatedApp(){
  var url = D.cfg.apiUrl || '';
  if(!url){
    alert('Please connect Google Sheets first (paste your URL and click Test Connection), then download.');
    return;
  }

  // Read the original HTML source from the server — NOT document.outerHTML.
  // document.outerHTML captures the live DOM which may have admin panel open,
  // injected scripts from Netlify, etc. We want the clean original file.
  fetch(window.location.href)
    .then(function(r){ return r.text(); })
    .then(function(html){
      // Strip any Netlify/CDN injected scripts (they add <script> at end of body)
      html = html.replace(/<script src="https:\/\/[^"]*netlify[^"]*"><\/script>/gi, '');

      // Bake the Sheets URL into the file
      html = html.replace(
        "var BAKED_SHEETS_URL = '';",
        "var BAKED_SHEETS_URL = '" + url.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "';"
      );

      // Ensure store view is active and admin view is not — reset DOM state
      html = html.replace('id="vs" class="view on"', 'id="vs" class="view on"'); // already correct
      html = html.replace('id="va" class="view on"', 'id="va" class="view"');     // reset if captured as active
      html = html.replace('id="vl" class="view on"', 'id="vl" class="view"');     // reset login too

      var blob = new Blob([html], {type:'text/html;charset=utf-8'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'index.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    })
    .catch(function(){
      // Fallback: use current page HTML but force-reset view classes
      var html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
      html = html.replace(
        "var BAKED_SHEETS_URL = '';",
        "var BAKED_SHEETS_URL = '" + url.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "';"
      );
      // Force store view to be active regardless of current state
      html = html.replace(/id="vs" class="view[^"]*"/g, 'id="vs" class="view on"');
      html = html.replace(/id="va" class="view[^"]*"/g, 'id="va" class="view"');
      html = html.replace(/id="vl" class="view[^"]*"/g, 'id="vl" class="view"');

      var blob = new Blob([html], {type:'text/html;charset=utf-8'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'index.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    });
}

function saveCfg(){
  var name = (document.getElementById('sn')||{value:'SENVIA'}).value.trim()||'SENVIA';
  var tag  = (document.getElementById('stag')||{value:''}).value.trim()||'Discover Premium Products';
  var aurl = (document.getElementById('sapi')||{value:''}).value.trim()||'';
  var pw   = (document.getElementById('spw')||{value:''}).value.trim()||'';

  D.cfg = {storeName:name, tagline:tag, logoUrl:slogo, apiUrl:aurl};
  persist();
  if(pw) LS.set('sv_pw', pw);

  renderBrand(); renderCatBar();

  // Push settings to Sheets so all customers see the new name/logo/tagline
  sheetsPost('saveSettings', {
    storeName: name,
    tagline:   tag,
    logoUrl:   slogo
    // apiUrl intentionally excluded — it lives only in localStorage
  });

  var m = document.getElementById('smsg');
  if(m){
    m.innerHTML = '<div class="as">✅ Settings saved and synced to all customers!' +
      (aurl ? ' Click <strong>🔗 Test Connection</strong> to verify Google Sheets.' : '') + '</div>';
    setTimeout(function(){ m.innerHTML=''; }, 5000);
  }
}

/* ══════════════════════════════
   INIT
══════════════════════════════ */
function init(){
  document.title = D.cfg.storeName || 'SENVIA';
  renderBrand();
  renderCatBar();
  renderGrid(); // show cached data instantly

  // Pull latest data from Sheets in background so all customers
  // always see the admin's latest products, categories, and settings
  if(D.cfg.apiUrl){
    syncFromSheets(function(ok){
      if(!ok) console.log('Sheets sync skipped — using local cache');
    });
  }
}

init();
</script>
